# --- BASIC SETTINGS ---
# Kitty natively supports a VS Code Dark theme. You can also run `kitty +kitten themes` to pick one interactively.
# color_scheme VS Code Dark+ 

font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size        10.5

font_features JetBrainsMonoNerdFontMono-Regular -calt -clig -liga

disable_ligatures always

scrollback_lines 10240
hide_window_decorations no
tab_bar_min_tabs 2 
window_padding_width 20 10 0 10 
inactive_text_alpha 0.6

cursor_shape block
shell_integration no-cursor
cursor_blink_interval 0.5

enabled_layouts splits, stack
map ctrl+a>v launch --location=vsplit --cwd=current
map ctrl+a>h launch --location=hsplit --cwd=current
map ctrl+a>z toggle_layout stack
map ctrl+a>x close_window
map ctrl+a>t new_tab

editor nvim
map ctrl+a>e launch --type=overlay --stdin-source=@screen_scrollback nvim -

map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down

map ctrl+shift+alt+h resize_window narrower 10
map ctrl+shift+alt+l resize_window wider 10
map ctrl+shift+alt+k resize_window taller 10
map ctrl+shift+alt+j resize_window shorter 10

map ctrl+shift+[ combine : scroll_line_up : scroll_line_up : scroll_line_up : scroll_line_up : scroll_line_up : scroll_line_up : scroll_line_up : scroll_line_up : scroll_line_up : scroll_line_up : scroll_line_up : scroll_line_up : scroll_line_up : scroll_line_up : scroll_line_up
map ctrl+shift+] combine : scroll_line_down : scroll_line_down : scroll_line_down : scroll_line_down : scroll_line_down : scroll_line_down : scroll_line_down : scroll_line_down : scroll_line_down : scroll_line_down : scroll_line_down : scroll_line_down : scroll_line_down : scroll_line_down : scroll_line_down

tab_bar_style powerline
tab_powerline_style slanted
tab_bar_align left

mouse_hide_wait -1.0

# BEGIN_KITTY_THEME
# VSCode_Dark
include current-theme.conf
# END_KITTY_THEME
